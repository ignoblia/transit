  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#5BCFFA"/>
      <stop offset="30%" stop-color="#F5A9B8"/>
      <stop offset="50%" stop-color="#FFFFFF"/>
      <stop offset="70%" stop-color="#F5A9B8"/>
      <stop offset="100%" stop-color="#5BCFFA"/>
    </linearGradient>
  </defs>
  <!-- Icon background: rounded square -->
  <rect x="1" y="1" width="30" height="30" rx="7" ry="7" fill="url(#bgGrad)"/>
  <!-- Stylized white double chevron -->
  <path d="M8 12l8 8-8 8" fill="none" stroke="#1a1a2e" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" opacity="0.85"/>
  <path d="M16 12l8 8-8 8" fill="none" stroke="#1a1a2e" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" opacity="0.55"/>
