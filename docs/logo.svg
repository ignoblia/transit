<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120">
  <!-- Rounded icon with trans pride gradient background -->
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#5BCFFA"/>
      <stop offset="30%" stop-color="#F5A9B8"/>
      <stop offset="50%" stop-color="#FFFFFF"/>
      <stop offset="70%" stop-color="#F5A9B8"/>
      <stop offset="100%" stop-color="#5BCFFA"/>
    </linearGradient>
  </defs>
  <!-- Icon background: rounded square -->
  <rect x="4" y="4" width="112" height="112" rx="24" ry="24" fill="url(#bgGrad)"/>
  <!-- Inner border -->
  <rect x="4" y="4" width="112" height="112" rx="24" ry="24" fill="none" stroke="rgba(255,255,255,0.4)" stroke-width="2"/>
  <!-- Stylized white double chevron -->
  <path d="M30 40l30 30-30 30" fill="none" stroke="#1a1a2e" stroke-width="7" stroke-linecap="round" stroke-linejoin="round" opacity="0.85"/>
  <path d="M60 40l30 30-30 30" fill="none" stroke="#1a1a2e" stroke-width="7" stroke-linecap="round" stroke-linejoin="round" opacity="0.55"/>
</svg>
