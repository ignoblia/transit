<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feFlood flood-color="#78B3E2" flood-opacity="0.6" result="color"/>
      <feComposite in="color" in2="blur" operator="in" result="glow"/>
      <feMerge>
        <feMergeNode in="glow"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <g filter="url(#glow)">
    <path d="M7 12l9 8-9 8" fill="none" stroke="#78B3E2" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M16 12l9 8-9 8" fill="none" stroke="#78B3E2" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" opacity="0.55"/>
  </g>
</svg>
